# Local dev stack for the Azure Functions pipeline.
#
#   azurite            - blob/queue/table storage emulator (Azure Storage)
#   sqledge            - SQL Server compatible backend used BOTH by the SB
#                        emulator for its own state AND by our app for the
#                        ContactsDb database
#   servicebus-emulator - Microsoft Service Bus emulator (preview)
#
# Start everything with:
#   docker compose up -d
#
# Tear down with:
#   docker compose down -v
services:
  azurite:
    container_name: lumovy-azurite
    image: mcr.microsoft.com/azure-storage/azurite:latest
    restart: unless-stopped
    # --skipApiVersionCheck lets newer Azure CLI / SDK versions talk to this
    # Azurite without hitting "API version YYYY-MM-DD is not supported" errors.
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --debug /data/debug.log --skipApiVersionCheck"
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    volumes:
      - azurite-data:/data
    networks:
      - lumovy-net

  sqledge:
    container_name: lumovy-sqledge
    image: mcr.microsoft.com/azure-sql-edge:latest
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Strong!Passw0rd"
    volumes:
      - sqledge-data:/var/opt/mssql
    networks:
      - lumovy-net

  servicebus-emulator:
    container_name: lumovy-sb-emulator
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    restart: unless-stopped
    depends_on:
      - sqledge
    ports:
      - "5672:5672"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "Strong!Passw0rd"
      ACCEPT_EULA: "Y"
    volumes:
      - ./servicebus-emulator/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    networks:
      - lumovy-net

networks:
  lumovy-net:
    driver: bridge

volumes:
  azurite-data:
  sqledge-data:
